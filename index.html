<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./styles.css" />
    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <article class="card">
      <div id="blog-img" class="content-img">
        <img
          class="content-img"
          src="assets/images/illustration-article.svg"
          alt="An illustration to promote a coding related course."
        />
      </div>
      <div id="blog-contents">
        <p class="content-type text-preset-3 bold">Learning</p>
        <p class="text-preset-2">Published 21 Dec 2023</p>
        <a class="content-title text-preset-1">HTML & CSS foundations</a>
        <p class="text-preset-3">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>
      </div>
      <div id="blog-author">
        <img
          src="./assets/images/image-avatar.webp"
          alt="user avatar"
          height="32px"
          width="32px"
        />
        <p class="text-preset-3 bold">Greg Hooper</p>
      </div>
    </article>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Phillip Wood</a>.
    </footer>
  </body>
</html>
